<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<script>
if (!localStorage.getItem("currentUser")) {
window.location.href = "index.html";
}
</script>

<div class="main">

<div class="top-bar">
<div class="user-info">
<div class="avatar"></div>
<span id="usernameDisplay"></span>
</div>
<button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
</div>

<h1 class="app-title">Budget Tracker</h1>

<div class="budget-container row">

<div class="col-md-4">
<form id="budgetForm">
<input type="number" id="budget" class="form-control mb-2" placeholder="Enter Budget">
<button class="btn btn-primary form-control">Add Budget</button>
</form>

<form id="expenseForm" class="mt-3">
<input type="text" id="expense" class="form-control mb-2" placeholder="Title">
<input type="number" id="amount" class="form-control mb-2" placeholder="Amount">

<select id="category" class="form-control mb-2">
<option>Food</option>
<option>Bills</option>
<option>Transport</option>
<option>Entertainment</option>
<option>Others</option>
</select>

<button class="btn btn-primary form-control">Add Expense</button>
</form>

<button class="btn btn-danger mt-2 form-control" onclick="resetAll()">Reset</button>
</div>

<div class="col-md-8">
<div class="row text-center">
<div class="col alert alert-primary">Budget: <span id="totalBudget">0</span></div>
<div class="col alert alert-primary">Expenses: <span id="totalExpenses">0</span></div>
<div class="col alert alert-primary">Left: <span id="budgetLeft">0</span></div>
</div>

<table class="table">
<thead>
<tr>
<th>Name</th>
<th>Amount</th>
<th>Category</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button class="btn btn-info" id="toggleChartBtn">Show Chart</button>
<div id="chartContainer" style="display:none;">
<canvas id="expenseChart"></canvas>
</div>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="auth.js"></script>
<script src="script.js"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">

<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
