<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker System</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<script>
if (!localStorage.getItem("currentUser")) {
    window.location.href = "index.html";
}
</script>

<div class="main">

    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="user-info">
            <div class="avatar">
                <!-- ICON -->
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 16 16">
                    <path d="M8 8a3 3 0 100-6 3 3 0 000 6zm0 1c-2.67 0-8 1.34-8 4v1h16v-1c0-2.66-5.33-4-8-4z"/>
                </svg>
            </div>
            <span id="usernameDisplay"></span>
        </div>

        <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
    </div>

    <!-- TITLE -->
    <h1 class="app-title">Budget Tracker System</h1>

    <!-- MAIN CONTENT -->
    <div class="budget-container row">
        <!-- (unchanged content mo dito) -->
        
        <!-- LEFT SIDE -->
        <div class="add-container col-12 col-md-4">
            <div class="add-budget-container">
                <h4>Add Budget</h4>
                <form>
                    <input class="form-control mb-2" type="number" id="budget" placeholder="Enter Budget">
                    <button class="btn btn-primary form-control">Add Budget</button>
                </form>
            </div>

            <div class="add-expense-container mt-4">
                <h4>Add Expense</h4>
                <form>
                    <input class="form-control mb-2" type="text" id="expense" placeholder="Title">
                    <input class="form-control mb-2" type="number" id="amount" placeholder="Amount">

                    <select class="form-control mb-2" id="category">
                        <option>Food</option>
                        <option>Bills</option>
                        <option>Transport</option>
                        <option>Entertainment</option>
                        <option>Others</option>
                    </select>

                    <button class="btn btn-primary form-control">Add Expense</button>
                </form>
            </div>

            <button class="btn btn-danger form-control mt-2" onclick="resetAll()">Reset All</button>
        </div>

        <!-- RIGHT SIDE -->
        <div class="display-container col-12 col-md-8">
            <div class="row text-center">
                <div class="alert alert-primary col">Budget: <span id="totalBudget">0</span></div>
                <div class="alert alert-primary col">Expenses: <span id="totalExpenses">0</span></div>
                <div class="alert alert-primary col">Left: <span id="budgetLeft">0</span></div>
            </div>

            <table class="table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <button class="btn btn-info mb-2" id="toggleChartBtn">Show Chart</button>

            <div id="chartContainer" style="display:none;">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="auth.js"></script>
<script src="script.js"></script>
</body>
</html>
