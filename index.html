<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">
<h2 class="text-center">Login</h2>

<input type="email" id="loginEmail" class="form-control mb-2" placeholder="Email">
<input type="password" id="loginPassword" class="form-control mb-2" placeholder="Password">

<button class="btn btn-primary btn-block" onclick="login()">Login</button>

<p class="text-center mt-2">
No account? <a href="register.html">Register</a>
</p>
</div>

<script src="auth.js"></script>

<script>
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
